<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Dashboard | Quickstop Super Deli</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="dashboard-header">
        <div class="header-content">
            <div class="logo-text">QUICKSTOP <span>MARKETING</span></div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Home Screen: Tool Grid -->
        <div id="home-screen">
            <h1 class="screen-title">What do you want to do?</h1>
            <div class="tool-grid">
                <button class="tool-card" data-tool="weekly-plan">
                    <div class="tool-icon tool-icon--calendar">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <h2 class="tool-name">This Week's Plan</h2>
                    <p class="tool-desc">Get a day-by-day plan with posts, photos to take, and what to promote</p>
                </button>

                <button class="tool-card" data-tool="social-media">
                    <div class="tool-icon tool-icon--camera">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </div>
                    <h2 class="tool-name">Social Media Posts</h2>
                    <p class="tool-desc">Ready-to-paste Instagram and Facebook captions with hashtags</p>
                </button>

                <button class="tool-card" data-tool="promotions">
                    <div class="tool-icon tool-icon--tag">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
                        </svg>
                    </div>
                    <h2 class="tool-name">Promotions & Specials</h2>
                    <p class="tool-desc">Deal ideas, sign text, and seasonal specials</p>
                </button>

                <button class="tool-card" data-tool="local-seo">
                    <div class="tool-icon tool-icon--search">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <h2 class="tool-name">Help People Find Us</h2>
                    <p class="tool-desc">Google listing posts and tips to show up in search</p>
                </button>

                <button class="tool-card" data-tool="review-response">
                    <div class="tool-icon tool-icon--star">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                        </svg>
                    </div>
                    <h2 class="tool-name">Reply to a Review</h2>
                    <p class="tool-desc">Paste a Google review and get a ready-to-post response</p>
                </button>
            </div>
        </div>

        <!-- Tool View: Input + Results -->
        <div id="tool-screen" class="hidden">
            <button id="back-btn" class="back-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" width="20" height="20">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
                Back
            </button>

            <h1 id="tool-title" class="screen-title"></h1>
            <p id="tool-description" class="tool-view-desc"></p>

            <div class="input-section">
                <label for="tool-input" id="input-label" class="input-label"></label>
                <textarea id="tool-input" rows="3" placeholder=""></textarea>
            </div>

            <button id="generate-btn" class="generate-btn">
                <span class="generate-btn-text">Generate</span>
                <span class="generate-btn-loading hidden">
                    <span class="spinner"></span>
                    Working on it...
                </span>
            </button>

            <!-- Results Area -->
            <div id="results-area" class="hidden">
                <div id="results-content"></div>
                <div class="results-actions">
                    <button id="copy-all-btn" class="action-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                        Copy Everything
                    </button>
                    <button id="regenerate-btn" class="action-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                        Generate Again
                    </button>
                </div>
            </div>

            <!-- Error State -->
            <div id="error-area" class="hidden">
                <p id="error-message"></p>
                <button id="retry-btn" class="action-btn">Try Again</button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
