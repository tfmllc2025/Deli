<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;display=swap');
      .headline { font-family: 'Bebas Neue', Impact, sans-serif; }
      .body { font-family: 'Arial', sans-serif; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="300" height="340" fill="#FFF8E7" rx="12"/>

  <!-- Outer Circle -->
  <circle cx="150" cy="130" r="110" fill="none" stroke="#1A1A1A" stroke-width="8"/>

  <!-- Inner Circle -->
  <circle cx="150" cy="130" r="90" fill="none" stroke="#1A1A1A" stroke-width="3"/>

  <!-- Top Text - QUICKSTOP -->
  <path id="topArc" d="M 60 130 A 90 90 0 0 1 240 130" fill="none"/>
  <text class="headline" fill="#1A1A1A" font-size="22" letter-spacing="6">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">QUICKSTOP</textPath>
  </text>

  <!-- Bottom Text - SUPER DELI -->
  <path id="bottomArc" d="M 60 130 A 90 90 0 0 0 240 130" fill="none"/>
  <text class="headline" fill="#1A1A1A" font-size="22" letter-spacing="6">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">SUPER DELI</textPath>
  </text>

  <!-- Three Stars -->
  <g fill="#1A1A1A">
    <polygon points="120,75 122,81 128,81 123,85 125,91 120,87 115,91 117,85 112,81 118,81" />
    <polygon points="150,70 152,76 158,76 153,80 155,86 150,82 145,86 147,80 142,76 148,76" />
    <polygon points="180,75 182,81 188,81 183,85 185,91 180,87 175,91 177,85 172,81 178,81" />
  </g>

  <!-- Sandwich Icon -->
  <g transform="translate(150, 135)">
    <!-- Top Bun -->
    <ellipse cx="0" cy="-20" rx="45" ry="18" fill="none" stroke="#1A1A1A" stroke-width="2.5"/>
    <path d="M -40 -20 Q 0 -45 40 -20" fill="none" stroke="#1A1A1A" stroke-width="2.5"/>
    <!-- Sesame seeds -->
    <ellipse cx="-15" cy="-30" rx="3" ry="2" fill="#1A1A1A"/>
    <ellipse cx="5" cy="-35" rx="3" ry="2" fill="#1A1A1A"/>
    <ellipse cx="20" cy="-28" rx="3" ry="2" fill="#1A1A1A"/>

    <!-- Lettuce -->
    <path d="M -45 -12 Q -35 -5 -25 -12 Q -15 -5 -5 -12 Q 5 -5 15 -12 Q 25 -5 35 -12 Q 45 -5 45 -12"
          fill="none" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>

    <!-- Meat/Filling -->
    <rect x="-42" y="-8" width="84" height="12" rx="2" fill="none" stroke="#1A1A1A" stroke-width="2.5"/>
    <line x1="-38" y1="-2" x2="38" y2="-2" stroke="#1A1A1A" stroke-width="1"/>

    <!-- Cheese zigzag -->
    <path d="M -44 8 L -36 15 L -28 8 L -20 15 L -12 8 L -4 15 L 4 8 L 12 15 L 20 8 L 28 15 L 36 8 L 44 15"
          fill="none" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Bottom Bun -->
    <ellipse cx="0" cy="22" rx="45" ry="12" fill="none" stroke="#1A1A1A" stroke-width="2.5"/>
  </g>

  <!-- Decorative line -->
  <line x1="60" y1="255" x2="240" y2="255" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Address Text -->
  <text x="150" y="278" text-anchor="middle" class="body" fill="#1A1A1A" font-size="14">461 Station Rd, Bellport, NY 11713</text>

  <!-- Phone Text -->
  <text x="150" y="295" text-anchor="middle" class="body" fill="#1A1A1A" font-size="14">Phone: (631) 286-1491</text>

  <!-- Decorative line -->
  <line x1="60" y1="315" x2="240" y2="315" stroke="#1A1A1A" stroke-width="2"/>
</svg>